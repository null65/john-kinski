paragraph_1: "John Kinski is a British novelist with a BA and MPhil in History from the London School of Economics. His fiction moves between seventeenth-century England and contemporary London — from the closed playhouses of the Civil War to the riot-torn streets of Tottenham — with an eye for character, political upheaval, and dark humour."
paragraph_2: "Theatrecy, published by Troubador in June 2026, is a black comedy about one man's mission to restore the Globe Theatre. Tottenham Boys is a suspense thriller set during the 2011 London riots, endorsed by Hanif Kureishi. Halfpenny, a Regency suspense novel, is nearing completion."
