backend:
  name: github
  repo: null65/john-kinski
  branch: main
  base_url: https://sveltia-cms-auth.jack-77f.workers.dev
  auth_methods:
    - oauth
    - token
  commit_messages:
    update: Update homepage banner
    create: Update homepage banner
    delete: Update homepage banner

site_url: https://johnkinski.com
display_url: https://johnkinski.com
logout_redirect_url: https://johnkinski.com

app_title: John Kinski — Website Manager

logo:
  src: /images/apple-touch-icon.png
  show_in_header: true

editor:
  preview: false

singletons:
  - name: homepage_banner
    label: Homepage Banner
    icon: campaign
    file: data/homepage.yml
    format: yaml
    fields:
      - label: Headline
        name: announcement_text
        widget: string
        required: true
        hint: "The main message on the blue banner at the bottom of your homepage. Example — Theatrecy — out now"
      - label: Button text
        name: button_label
        widget: string
        required: true
        hint: "What visitors read on the button. Example — Buy on Amazon"
      - label: Link address
        name: destination_url
        widget: string
        required: true
        hint: "Where the button takes people. Paste the full web address."
        pattern:
          - "^https?://"
          - "Must start with https:// — e.g. https://troubador.co.uk/bookshop/historical/theatrecy"
