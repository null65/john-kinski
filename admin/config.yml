backend:
  name: github
  repo: null65/john-kinski
  branch: main
  base_url: https://sveltia-cms-auth.jack-77f.workers.dev
  auth_methods:
    - oauth
    - token
  commit_messages:
    update: Update website content
    create: Update website content
    delete: Update website content

site_url: https://johnkinski.com
display_url: https://johnkinski.com
logout_redirect_url: https://johnkinski.com

media_folder: assets/uploads
public_folder: /assets/uploads

app_title: John Kinski — Website Manager

logo:
  src: /images/apple-touch-icon.png
  show_in_header: true

editor:
  preview: false

singletons:
  - name: site_announcement
    label: Top Announcement Bar
    icon: notifications
    file: data/announcement.yml
    format: yaml
    fields:
      - label: Show announcement bar
        name: show
        widget: boolean
        default: false
        hint: "Turn on to show a message strip at the very top of every page."
      - label: Message
        name: message
        widget: string
        required: true
        hint: "Short announcement. Example — Theatrecy is out now"
      - label: Link address (optional)
        name: link_url
        widget: string
        required: false
        hint: "If you add a link, the whole bar becomes clickable."

  - name: homepage_hero
    label: Homepage Hero
    icon: person
    file: data/hero.yml
    format: yaml
    fields:
      - label: Main headline
        name: title
        widget: string
        required: true
      - label: Opening line
        name: lead_1
        widget: text
        required: true
      - label: Second line
        name: lead_2
        widget: text
        required: true
      - label: Stat 1 — number
        name: stat_1_value
        widget: string
      - label: Stat 1 — label
        name: stat_1_label
        widget: string
      - label: Stat 2 — number
        name: stat_2_value
        widget: string
      - label: Stat 2 — label
        name: stat_2_label
        widget: string
      - label: Stat 3 — number
        name: stat_3_value
        widget: string
      - label: Stat 3 — label
        name: stat_3_label
        widget: string
      - label: Primary button text
        name: btn_primary_label
        widget: string
      - label: Primary button link
        name: btn_primary_url
        widget: string
        hint: "Page on your site (theatrecy.html) or full https:// link"
      - label: Secondary button text
        name: btn_secondary_label
        widget: string
      - label: Secondary button link
        name: btn_secondary_url
        widget: string

  - name: homepage_intro
    label: Homepage Introduction
    icon: article
    file: data/intro.yml
    format: yaml
    fields:
      - label: First paragraph
        name: paragraph_1
        widget: text
        required: true
      - label: Second paragraph
        name: paragraph_2
        widget: text
        required: true

  - name: featured_book
    label: Featured Book Spotlight
    icon: auto_stories
    file: data/featured.yml
    format: yaml
    fields:
      - label: Badge text
        name: badge
        widget: string
        hint: "Small label above the title. Example — Latest release · June 2026"
      - label: Book title
        name: title
        widget: string
        required: true
      - label: Description
        name: description
        widget: text
        required: true
      - label: Primary button text
        name: btn_primary_label
        widget: string
      - label: Primary button link
        name: btn_primary_url
        widget: string
      - label: Secondary button text
        name: btn_secondary_label
        widget: string
      - label: Buy / external link
        name: btn_secondary_url
        widget: string
        hint: "Usually an Amazon or Troubador link"

  - name: homepage_banner
    label: Bottom Banner & Button
    icon: campaign
    file: data/homepage.yml
    format: yaml
    fields:
      - label: Headline
        name: announcement_text
        widget: string
        required: true
        hint: "The blue banner at the bottom of the homepage"
      - label: Button text
        name: button_label
        widget: string
        required: true
      - label: Link address
        name: destination_url
        widget: string
        required: true
        pattern:
          - "^https?://"
          - "Must start with https://"

  - divider: true

  - name: news_updates
    label: News & Updates
    icon: newspaper
    file: data/news.json
    format: json
    fields:
      - label: News items
        name: items
        widget: list
        summary: "{{fields.title}}"
        hint: "Add news about new books, events, or reviews. Newest first works best."
        fields:
          - label: Date
            name: date
            widget: datetime
            date_format: YYYY-MM-DD
            time_format: false
          - label: Headline
            name: title
            widget: string
            required: true
          - label: Summary
            name: summary
            widget: text
            required: true
          - label: Read more link (optional)
            name: url
            widget: string
            required: false

  - divider: true

  - name: contact_page
    label: Contact Page
    icon: mail
    file: data/contact.yml
    format: yaml
    fields:
      - label: Page title
        name: page_title
        widget: string
        required: true
      - label: Page subtitle
        name: page_subtitle
        widget: text
        required: true
      - label: Email section heading
        name: email_heading
        widget: string
      - label: Email section text
        name: email_intro
        widget: text
      - label: Press section heading
        name: press_heading
        widget: string
      - label: Press section text
        name: press_intro
        widget: text
